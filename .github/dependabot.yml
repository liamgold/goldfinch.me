version: 2
updates:
  # Maintain dependencies for Kentico Admin project (npm)
  - package-ecosystem: "npm"
    directory: "/src/Goldfinch.Admin/Client/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
    ignore:
      - dependency-name: "@kentico/*"
    groups:
      # Babel packages must move in lockstep (peer deps) — batch all update types.
      babel:
        patterns:
          - "@babel/*"
          - "babel-loader"
      # React + its type packages — batch all update types.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Everything else: batch routine minor/patch into one PR; majors stay individual for review.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # Maintain dependencies for Presentation site (npm)
  - package-ecosystem: "npm"
    directory: "/src/Goldfinch.Web/wwwroot/sitefiles/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
    groups:
      # Batch routine minor/patch into one PR; majors (e.g. vite, typescript) stay individual for review.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # Maintain NuGet dependencies for backend solution
  - package-ecosystem: "nuget"
    directory: "/src/Goldfinch.Web/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
    ignore:
      - dependency-name: "Kentico.Xperience.*"
    groups:
      # Batch routine minor/patch into one PR; majors stay individual for review.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5
